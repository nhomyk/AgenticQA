[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

markers =
    snapshot: snapshot testing for data quality
    integration: integration tests
    unit: unit tests
    slow: slow running tests
    pipeline: full pipeline framework tests
    critical: fast health checks for CI health gate
    deployment: production readiness verification
    fast: fast tests
    data_integrity: data structure and type validation
    data_quality: data content quality checks
    data_security: security and PII validation
    data_duplication: duplicate and similarity detection
    data_snapshot: before/after comparison tests
