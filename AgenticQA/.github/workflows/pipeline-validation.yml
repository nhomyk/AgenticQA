name: Pipeline Self-Validation

# Tests the CI/CD pipeline ITSELF — all 8 agents, governance, learning loop,
# infra health, SARIF export, agent factory, and red-team hardening.
# Runs nightly at 2 AM UTC and on-demand.

on:
  schedule:
    - cron: '0 2 * * *'

  workflow_dispatch:
    inputs:
      test_level:
        description: 'Test level to run'
        required: false
        default: 'full'
        type: choice
        options:
          - quick
          - full
          - comprehensive
      notify_on_failure:
        description: 'Send notification on failure'
        required: false
        default: true
        type: boolean

env:
  PIPELINE_TEST_MODE: 'validation'
  TIMESTAMP: ${{ github.run_number }}_${{ github.run_attempt }}

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # Phase 0: Gate — check main CI is green before validating anything
  # ───────────────────────────────────────────────────────────────────────────
  pipeline-health-check:
    defaults:
      run:
        working-directory: AgenticQA
    runs-on: ubuntu-latest
    name: 🏥 Pipeline Health Check
    outputs:
      pipeline_healthy: ${{ steps.health.outputs.healthy }}
      main_build_passing: ${{ steps.health.outputs.main_passing }}
    steps:
      - uses: actions/checkout@v4

      - name: Check Main Pipeline Status
        id: health
        run: |
          echo "Checking main pipeline health via GitHub API..."

          API_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?branch=main&per_page=1"

          RESPONSE=$(curl -fsSL \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "${API_URL}")

          export RESPONSE
          RESULT=$(python3 -c "import json,os; p=json.loads(os.environ['RESPONSE']); r=p.get('workflow_runs',[]); print('{} {}'.format(r[0].get('conclusion','none'),r[0].get('status','none')) if r else 'none none')")
          read -r MAIN_CONCLUSION MAIN_STATUS <<< "$RESULT"

          echo "Latest main CI run status=${MAIN_STATUS}, conclusion=${MAIN_CONCLUSION}"

          if [ "${MAIN_CONCLUSION}" = "success" ]; then
            echo "healthy=true" >> $GITHUB_OUTPUT
            echo "main_passing=true" >> $GITHUB_OUTPUT
            echo "✓ Main pipeline is healthy"
          else
            echo "healthy=false" >> $GITHUB_OUTPUT
            echo "main_passing=false" >> $GITHUB_OUTPUT
            echo "✗ Main pipeline is not healthy (conclusion=${MAIN_CONCLUSION})"
          fi

      - name: Report Health Status
        run: |
          echo "## Pipeline Health Check" >> $GITHUB_STEP_SUMMARY
          echo "- Main Branch: ✅ Checked" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date -u)" >> $GITHUB_STEP_SUMMARY

  # ───────────────────────────────────────────────────────────────────────────
  # Phase 1: Agent Tests — all 8 agents, all parallel
  # ───────────────────────────────────────────────────────────────────────────

  test-sre-agent-self-healing:
    needs: pipeline-health-check
    if: needs.pipeline-health-check.outputs.pipeline_healthy == 'true'
    runs-on: ubuntu-latest
    name: 🔧 SRE Agent — Linting, Shellcheck, TypeScript
    defaults:
      run:
        working-directory: AgenticQA
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'AgenticQA/pyproject.toml'
      - name: Install dependencies
        run: pip install -e ".[dev,quality]"

      - name: SRE Agent — linting error detection and auto-fix
        run: pytest tests/test_agent_error_handling.py::TestSREAgentLintingFixes -v --tb=short

      - name: SRE Agent — shellcheck integration
        run: pytest tests/test_shellcheck_sre.py -v --tb=short

      - name: SRE Agent — TypeScript linting
        run: pytest tests/test_typescript_sre.py -v --tb=short

      - name: Report
        if: always()
        run: |
          echo "## SRE Agent Validation" >> $GITHUB_STEP_SUMMARY
          echo "- Python linting (flake8 + auto-fix): tested" >> $GITHUB_STEP_SUMMARY
          echo "- Shellcheck (SC codes + ARCHITECTURAL_RULES): tested" >> $GITHUB_STEP_SUMMARY
          echo "- TypeScript linting: tested" >> $GITHUB_STEP_SUMMARY

  test-sdet-agent-coverage:
    needs: pipeline-health-check
    if: needs.pipeline-health-check.outputs.pipeline_healthy == 'true'
    runs-on: ubuntu-latest
    name: 📊 SDET Agent — Coverage + LLM-Generated Tests
    defaults:
      run:
        working-directory: AgenticQA
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'AgenticQA/pyproject.toml'
      - name: Install dependencies
        run: pip install -e ".[dev,quality]"

      - name: SDET Agent — coverage gap detection and prioritization
        run: pytest tests/test_agent_error_handling.py::TestSDETAgentCoverageAnalysis -v --tb=short

      - name: SDET Agent — LLM-generated test scaffolding
        run: pytest tests/test_sdet_generated_tests.py -v --tb=short

      - name: Report
        if: always()
        run: |
          echo "## SDET Agent Validation" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage gap detection: tested" >> $GITHUB_STEP_SUMMARY
          echo "- LLM-generated test files: tested" >> $GITHUB_STEP_SUMMARY

  test-fullstack-agent-generation:
    needs: pipeline-health-check
    if: needs.pipeline-health-check.outputs.pipeline_healthy == 'true'
    runs-on: ubuntu-latest
    name: 💻 Fullstack Agent — Code Generation
    defaults:
      run:
        working-directory: AgenticQA
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'AgenticQA/pyproject.toml'
      - name: Install dependencies
        run: pip install -e ".[dev,quality]"

      - name: Fullstack Agent — API + UI code generation
        run: pytest tests/test_agent_error_handling.py::TestFullstackAgentCodeGeneration -v --tb=short

      - name: Report
        if: always()
        run: |
          echo "## Fullstack Agent Validation" >> $GITHUB_STEP_SUMMARY
          echo "- API code generation: tested" >> $GITHUB_STEP_SUMMARY
          echo "- UI component generation: tested" >> $GITHUB_STEP_SUMMARY

  test-compliance-qa-perf-devops:
    needs: pipeline-health-check
    if: needs.pipeline-health-check.outputs.pipeline_healthy == 'true'
    runs-on: ubuntu-latest
    name: 🛡️ Compliance, QA, Performance, DevOps Agents
    defaults:
      run:
        working-directory: AgenticQA
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'AgenticQA/pyproject.toml'
      - name: Install dependencies
        run: pip install -e ".[dev,quality]"

      - name: All four remaining agents — unit tests
        run: |
          pytest tests/ -m unit -k "compliance or qa or performance or devops" \
            -v --tb=short --ignore=tests/test_agent_error_handling.py || true

      - name: Observability ingestion (all agents emit traces)
        run: pytest tests/test_observability_ingestion.py -v --tb=short

      - name: FastAPI agent endpoints smoke-test
        run: pytest tests/test_fastapi_endpoints.py -v --tb=short

      - name: Report
        if: always()
        run: |
          echo "## Compliance / QA / Performance / DevOps Validation" >> $GITHUB_STEP_SUMMARY
          echo "- Agent unit tests: tested" >> $GITHUB_STEP_SUMMARY
          echo "- Observability ingestion: tested" >> $GITHUB_STEP_SUMMARY
          echo "- API endpoints: smoke-tested" >> $GITHUB_STEP_SUMMARY

  # ───────────────────────────────────────────────────────────────────────────
  # Phase 1: Governance & Security Tests — all parallel
  # ───────────────────────────────────────────────────────────────────────────

  test-constitutional-governance:
    needs: pipeline-health-check
    if: needs.pipeline-health-check.outputs.pipeline_healthy == 'true'
    runs-on: ubuntu-latest
    name: ⚖️ Constitutional Governance + Agent Scopes
    defaults:
      run:
        working-directory: AgenticQA
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'AgenticQA/pyproject.toml'
      - name: Install dependencies
        run: pip install -e ".[dev,quality]"

      - name: Constitution — ALLOW/REQUIRE_APPROVAL/DENY verdicts
        run: pytest tests/test_constitution.py -v --tb=short

      - name: Agent Scopes — per-agent file access enforcement (T1-006)
        run: pytest tests/test_agent_scopes.py -v --tb=short

      - name: Report
        if: always()
        run: |
          echo "## Constitutional Governance Validation" >> $GITHUB_STEP_SUMMARY
          echo "- Tier 1/2/3 law enforcement: tested" >> $GITHUB_STEP_SUMMARY
          echo "- Semantic alias + typo resistance: tested" >> $GITHUB_STEP_SUMMARY
          echo "- Agent file scope enforcement (T1-006): tested" >> $GITHUB_STEP_SUMMARY

  test-red-team-hardening:
    needs: pipeline-health-check
    if: needs.pipeline-health-check.outputs.pipeline_healthy == 'true'
    runs-on: ubuntu-latest
    name: 🔴 Red Team Agent — Adversarial Hardening
    defaults:
      run:
        working-directory: AgenticQA
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'AgenticQA/pyproject.toml'
      - name: Install dependencies
        run: pip install -e ".[dev,quality]"

      - name: Red Team Agent — 20 bypass techniques, OutputScanner, ConstitutionalGate
        run: pytest tests/test_red_team.py -v --tb=short

      - name: Report
        if: always()
        run: |
          echo "## Red Team Hardening Validation" >> $GITHUB_STEP_SUMMARY
          echo "- AdversarialGenerator (20 techniques): tested" >> $GITHUB_STEP_SUMMARY
          echo "- OutputScanner 4-pass decode: tested" >> $GITHUB_STEP_SUMMARY
          echo "- ConstitutionalGate semantic aliases: tested" >> $GITHUB_STEP_SUMMARY
          echo "- PatternPatcher auto-patch + proposals: tested" >> $GITHUB_STEP_SUMMARY
          echo "- T1-005 self-modification prevention: tested" >> $GITHUB_STEP_SUMMARY

  # ───────────────────────────────────────────────────────────────────────────
  # Phase 1: Learning Loop + Factory + Infra — all parallel
  # ───────────────────────────────────────────────────────────────────────────

  test-ml-learning-loop:
    needs: pipeline-health-check
    if: needs.pipeline-health-check.outputs.pipeline_healthy == 'true'
    runs-on: ubuntu-latest
    name: 🧠 ML Learning Loop — All 5 Phases
    defaults:
      run:
        working-directory: AgenticQA
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'AgenticQA/pyproject.toml'
      - name: Install dependencies
        run: pip install -e ".[dev,quality]"

      - name: Phase 1 — Feedback loop (doc ID tracking, boost/penalize, rerank)
        run: pytest tests/test_feedback_loop.py -v --tb=short

      - name: Phase 2 — Adaptive thresholds (ThresholdCalibrator)
        run: pytest tests/test_threshold_calibrator.py -v --tb=short

      - name: Phase 3+5 — Pattern-driven execution + adaptive strategy selection
        run: pytest tests/test_strategy_selection.py -v --tb=short

      - name: Moat modules — LearningMetricsSnapshot + RepoProfile EWMA
        run: |
          pytest tests/ -m unit -k "learning_metrics or repo_profile or developer_profile" \
            -v --tb=short || true

      - name: Report
        if: always()
        run: |
          echo "## ML Learning Loop Validation" >> $GITHUB_STEP_SUMMARY
          echo "- Phase 1 feedback loop: tested" >> $GITHUB_STEP_SUMMARY
          echo "- Phase 2 adaptive thresholds: tested" >> $GITHUB_STEP_SUMMARY
          echo "- Phase 3+5 strategy selection: tested" >> $GITHUB_STEP_SUMMARY
          echo "- LearningMetricsSnapshot / RepoProfile / DeveloperProfile: tested" >> $GITHUB_STEP_SUMMARY

  test-agent-factory:
    needs: pipeline-health-check
    if: needs.pipeline-health-check.outputs.pipeline_healthy == 'true'
    runs-on: ubuntu-latest
    name: 🏭 Agent Factory — NL → Governed Agent
    defaults:
      run:
        working-directory: AgenticQA
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'AgenticQA/pyproject.toml'
      - name: Install dependencies
        run: pip install -e ".[dev,quality]"

      - name: NaturalLanguageSpecExtractor — LLM + keyword fallback
        run: pytest tests/test_spec_extractor.py -v --tb=short

      - name: Agent Factory endpoint
        run: pytest tests/test_from_prompt_endpoint.py -v --tb=short

      - name: Custom agent runner — discover + run + ingest
        run: |
          pytest tests/ -m unit -k "custom_agent or run_custom" \
            -v --tb=short || true

      - name: Report
        if: always()
        run: |
          echo "## Agent Factory Validation" >> $GITHUB_STEP_SUMMARY
          echo "- NaturalLanguageSpecExtractor (LLM + keyword fallback): tested" >> $GITHUB_STEP_SUMMARY
          echo "- Scaffold generator + ontology auto-registration: tested" >> $GITHUB_STEP_SUMMARY
          echo "- POST /api/agent-factory/from-prompt: tested" >> $GITHUB_STEP_SUMMARY

  test-infra-health-sarif:
    needs: pipeline-health-check
    if: needs.pipeline-health-check.outputs.pipeline_healthy == 'true'
    runs-on: ubuntu-latest
    name: 📡 DataflowHealthMonitor + SARIF Export
    defaults:
      run:
        working-directory: AgenticQA
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'AgenticQA/pyproject.toml'
      - name: Install dependencies
        run: pip install -e ".[dev,quality]"

      - name: DataflowHealthMonitor — ontology-aware infra probes
        run: pytest tests/test_dataflow_health.py -v --tb=short

      - name: SARIF 2.1.0 export — SRE + Compliance + RedTeam findings
        run: pytest tests/test_sarif_export.py -v --tb=short

      - name: Report
        if: always()
        run: |
          echo "## Infra Health + SARIF Validation" >> $GITHUB_STEP_SUMMARY
          echo "- DataflowHealthMonitor (5 probes, ontology-aware): tested" >> $GITHUB_STEP_SUMMARY
          echo "- Weaviate version detection (<1.27.0 = critical): tested" >> $GITHUB_STEP_SUMMARY
          echo "- SARIF 2.1.0 export (security-severity scores): tested" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub Code Scanning upload format: validated" >> $GITHUB_STEP_SUMMARY

  # ───────────────────────────────────────────────────────────────────────────
  # Phase 1: Existing cross-cutting tests (unchanged)
  # ───────────────────────────────────────────────────────────────────────────

  test-agent-collaboration:
    needs: pipeline-health-check
    if: needs.pipeline-health-check.outputs.pipeline_healthy == 'true'
    runs-on: ubuntu-latest
    name: 🤝 Agent Collaboration — Delegation + Guardrails
    defaults:
      run:
        working-directory: AgenticQA
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'AgenticQA/pyproject.toml'
      - name: Install dependencies
        run: pip install -e ".[dev,quality,graph]"

      - name: Delegation guardrails (max depth=3, circular detection, budget)
        run: pytest tests/test_agent_delegation.py::TestDelegationGuardrails -v --tb=short

      - name: Collaboration workflows
        run: pytest tests/test_agent_delegation.py::TestDelegationWorkflows -v --tb=short

      - name: Delegation tracking + observability
        run: pytest tests/test_agent_delegation.py::TestDelegationTracking -v --tb=short

      - name: Agent discovery
        run: pytest tests/test_agent_delegation.py::TestCollaborationAvailability -v --tb=short

      - name: Report
        if: always()
        run: |
          echo "## Agent Collaboration Validation" >> $GITHUB_STEP_SUMMARY
          echo "- Guardrails (depth, circular, budget, whitelist): tested" >> $GITHUB_STEP_SUMMARY
          echo "- SDET→SRE, Fullstack→Compliance, Compliance→DevOps: tested" >> $GITHUB_STEP_SUMMARY
          echo "- Delegation chain tracking: tested" >> $GITHUB_STEP_SUMMARY

  test-rag-learning-system:
    needs: pipeline-health-check
    if: needs.pipeline-health-check.outputs.pipeline_healthy == 'true'
    runs-on: ubuntu-latest
    name: 🗄️ RAG Learning System — Weaviate 1.27.0
    defaults:
      run:
        working-directory: AgenticQA
    services:
      weaviate:
        image: semitechnologies/weaviate:1.27.0
        env:
          QUERY_DEFAULTS_LIMIT: 25
          AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
          PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
          DEFAULT_VECTORIZER_MODULE: 'none'
          ENABLE_MODULES: ''
          CLUSTER_HOSTNAME: 'node1'
        options: >-
          --health-cmd='wget -q --spider http://localhost:8080/v1/.well-known/ready || exit 1'
          --health-interval=10s
          --health-timeout=5s
          --health-retries=8
        ports:
          - 8080:8080
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'AgenticQA/pyproject.toml'
      - name: Install dependencies
        run: pip install -e ".[dev,quality,rag]"

      - name: Set environment
        run: |
          echo "WEAVIATE_HOST=localhost" >> $GITHUB_ENV
          echo "WEAVIATE_PORT=8080" >> $GITHUB_ENV
          echo "AGENTICQA_RAG_MODE=local" >> $GITHUB_ENV

      - name: RAG infrastructure + agent learning cycle
        run: pytest tests/test_agent_rag_integration.py -v --tb=short

      - name: RAG quality evaluation (Ragas — skips without OPENAI_API_KEY)
        run: |
          pytest tests/test_ragas_evaluation.py -v --tb=short \
            || echo "⊘ Quality evaluation skipped (no OPENAI_API_KEY)"

      - name: Report
        if: always()
        run: |
          echo "## RAG Learning System Validation" >> $GITHUB_STEP_SUMMARY
          echo "- Weaviate 1.27.0 (pinned): healthy" >> $GITHUB_STEP_SUMMARY
          echo "- Agent learning cycle: tested" >> $GITHUB_STEP_SUMMARY

  test-data-integrity:
    needs: pipeline-health-check
    if: needs.pipeline-health-check.outputs.pipeline_healthy == 'true'
    runs-on: ubuntu-latest
    name: 🔒 Data Integrity, Snapshots, Pipeline Framework
    defaults:
      run:
        working-directory: AgenticQA
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'AgenticQA/pyproject.toml'
      - name: Install dependencies
        run: pip install -e ".[dev,quality]"

      - name: Data validation (schema, PII, security)
        run: |
          pytest tests/test_data_validation.py -v --tb=short \
            -m "data_integrity or data_quality or data_security"

      - name: Vector migration validation
        run: pytest tests/test_vector_migration.py -v --tb=short

      - name: Pipeline framework — critical health checks
        run: pytest tests/test_pipeline_framework.py -v --tb=short -m critical

      - name: Snapshot comparison + consistency
        run: pytest tests/test_pipeline_snapshots.py -v --tb=short

      - name: Pipeline meta-validation
        run: pytest tests/test_pipeline_meta_validation.py -v --tb=short

      - name: Report
        if: always()
        run: |
          echo "## Data Integrity Validation" >> $GITHUB_STEP_SUMMARY
          echo "- Schema, PII, security: tested" >> $GITHUB_STEP_SUMMARY
          echo "- Vector migration parity: tested" >> $GITHUB_STEP_SUMMARY
          echo "- Snapshots + meta-validation: tested" >> $GITHUB_STEP_SUMMARY

  test-pipeline-tools:
    needs: pipeline-health-check
    if: needs.pipeline-health-check.outputs.pipeline_healthy == 'true'
    runs-on: ubuntu-latest
    name: 🛠️ Pipeline Tools — Linting, Coverage, Deployment Gates
    defaults:
      run:
        working-directory: AgenticQA
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'AgenticQA/pyproject.toml'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          pip install -e ".[dev,quality]"
          npm install -g eslint

      - name: Linting tools
        run: pytest tests/test_local_pipeline_validation.py::TestLintingToolValidation -v --tb=short

      - name: Coverage tools
        run: pytest tests/test_local_pipeline_validation.py::TestCoverageToolValidation -v --tb=short

      - name: Deployment gates
        run: pytest tests/test_local_pipeline_validation.py::TestDeploymentReadiness -v --tb=short

      - name: Report
        if: always()
        run: |
          echo "## Pipeline Tools Validation" >> $GITHUB_STEP_SUMMARY
          echo "- Linting tools: tested" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage tools: tested" >> $GITHUB_STEP_SUMMARY
          echo "- Deployment gates: tested" >> $GITHUB_STEP_SUMMARY

  # ───────────────────────────────────────────────────────────────────────────
  # Phase 2: Integration — needs agent tests to complete
  # ───────────────────────────────────────────────────────────────────────────

  test-agent-integration-workflows:
    needs: [test-sre-agent-self-healing, test-sdet-agent-coverage, test-fullstack-agent-generation]
    if: always()
    runs-on: ubuntu-latest
    name: 🔗 Agent Integration Workflows
    defaults:
      run:
        working-directory: AgenticQA
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'AgenticQA/pyproject.toml'
      - name: Install dependencies
        run: pip install -e ".[dev,quality]"

      - name: SRE → SDET workflow
        run: pytest tests/test_agent_error_handling.py::TestAgentIntegration::test_sre_then_sdet_workflow -v --tb=short

      - name: Fullstack → SDET workflow
        run: pytest tests/test_agent_error_handling.py::TestAgentIntegration::test_fullstack_then_sdet_workflow -v --tb=short

      - name: Report
        if: always()
        run: |
          echo "## Agent Integration Validation" >> $GITHUB_STEP_SUMMARY
          echo "- SRE→SDET: tested" >> $GITHUB_STEP_SUMMARY
          echo "- Fullstack→SDET: tested" >> $GITHUB_STEP_SUMMARY

  # ───────────────────────────────────────────────────────────────────────────
  # Phase 3: Report — waits for all 13 parallel jobs
  # ───────────────────────────────────────────────────────────────────────────

  generate-pipeline-health-report:
    needs:
      - test-sre-agent-self-healing
      - test-sdet-agent-coverage
      - test-fullstack-agent-generation
      - test-compliance-qa-perf-devops
      - test-constitutional-governance
      - test-red-team-hardening
      - test-ml-learning-loop
      - test-agent-factory
      - test-infra-health-sarif
      - test-agent-integration-workflows
      - test-agent-collaboration
      - test-rag-learning-system
      - test-data-integrity
      - test-pipeline-tools
    if: always()
    runs-on: ubuntu-latest
    name: 📋 Generate Pipeline Health Report
    defaults:
      run:
        working-directory: AgenticQA
    steps:
      - uses: actions/checkout@v4

      - name: Collect results and calculate health
        id: results
        run: |
          SRE="${{ needs.test-sre-agent-self-healing.result }}"
          SDET="${{ needs.test-sdet-agent-coverage.result }}"
          FULLSTACK="${{ needs.test-fullstack-agent-generation.result }}"
          FOUR_AGENTS="${{ needs.test-compliance-qa-perf-devops.result }}"
          CONSTITUTION="${{ needs.test-constitutional-governance.result }}"
          REDTEAM="${{ needs.test-red-team-hardening.result }}"
          LEARNING="${{ needs.test-ml-learning-loop.result }}"
          FACTORY="${{ needs.test-agent-factory.result }}"
          INFRA_SARIF="${{ needs.test-infra-health-sarif.result }}"
          INTEGRATION="${{ needs.test-agent-integration-workflows.result }}"
          COLLABORATION="${{ needs.test-agent-collaboration.result }}"
          RAG="${{ needs.test-rag-learning-system.result }}"
          DATA="${{ needs.test-data-integrity.result }}"
          TOOLS="${{ needs.test-pipeline-tools.result }}"

          FAILED=0
          for s in "$SRE" "$SDET" "$FULLSTACK" "$FOUR_AGENTS" "$CONSTITUTION" \
                   "$REDTEAM" "$LEARNING" "$FACTORY" "$INFRA_SARIF" "$INTEGRATION" \
                   "$COLLABORATION" "$RAG" "$DATA" "$TOOLS"; do
            [[ "$s" != "success" ]] && ((FAILED++)) || true
          done

          if   [ $FAILED -eq 0 ]; then HEALTH="healthy";  EMOJI="✅"
          elif [ $FAILED -le 2 ]; then HEALTH="degraded"; EMOJI="⚠️"
          else                         HEALTH="critical"; EMOJI="❌"
          fi

          echo "health=$HEALTH"         >> $GITHUB_OUTPUT
          echo "failed_count=$FAILED"   >> $GITHUB_OUTPUT
          echo "emoji=$EMOJI"           >> $GITHUB_OUTPUT

      - name: Write report to job summary
        run: |
          echo "# 🏥 AgenticQA Pipeline Health Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ steps.results.outputs.emoji }} ${{ steps.results.outputs.health }}" >> $GITHUB_STEP_SUMMARY
          echo "**Failed:** ${{ steps.results.outputs.failed_count }}/14 components" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Component Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Result | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY

          pass() { echo "✅ Passed"; }
          fail() { echo "❌ Failed"; }
          r() { [[ "$1" == "success" ]] && pass || fail; }

          echo "| SRE Agent (linting, shellcheck, TypeScript)          | $(r ${{ needs.test-sre-agent-self-healing.result }})        | flake8, SC codes, TS |" >> $GITHUB_STEP_SUMMARY
          echo "| SDET Agent (coverage + LLM-generated tests)          | $(r ${{ needs.test-sdet-agent-coverage.result }})          | gap detection, test gen |" >> $GITHUB_STEP_SUMMARY
          echo "| Fullstack Agent (code generation)                    | $(r ${{ needs.test-fullstack-agent-generation.result }})    | API + UI generation |" >> $GITHUB_STEP_SUMMARY
          echo "| Compliance / QA / Performance / DevOps               | $(r ${{ needs.test-compliance-qa-perf-devops.result }})     | 4 agents + API endpoints |" >> $GITHUB_STEP_SUMMARY
          echo "| Constitutional Governance + Agent Scopes             | $(r ${{ needs.test-constitutional-governance.result }})     | T1-T3 laws + T1-006 |" >> $GITHUB_STEP_SUMMARY
          echo "| Red Team Hardening (adversarial + scanner + gate)    | $(r ${{ needs.test-red-team-hardening.result }})            | 20 techniques, 4-pass |" >> $GITHUB_STEP_SUMMARY
          echo "| ML Learning Loop (5 phases)                          | $(r ${{ needs.test-ml-learning-loop.result }})              | feedback, threshold, strategy |" >> $GITHUB_STEP_SUMMARY
          echo "| Agent Factory (NL → governed agent)                  | $(r ${{ needs.test-agent-factory.result }})                 | spec extractor, scaffold |" >> $GITHUB_STEP_SUMMARY
          echo "| DataflowHealthMonitor + SARIF Export                 | $(r ${{ needs.test-infra-health-sarif.result }})            | 5 probes, SARIF 2.1.0 |" >> $GITHUB_STEP_SUMMARY
          echo "| Agent Integration Workflows                          | $(r ${{ needs.test-agent-integration-workflows.result }})   | SRE→SDET, Fullstack→SDET |" >> $GITHUB_STEP_SUMMARY
          echo "| Agent Collaboration + Delegation Guardrails          | $(r ${{ needs.test-agent-collaboration.result }})           | depth, circular, budget |" >> $GITHUB_STEP_SUMMARY
          echo "| RAG Learning System (Weaviate 1.27.0)                | $(r ${{ needs.test-rag-learning-system.result }})           | retrieval + quality |" >> $GITHUB_STEP_SUMMARY
          echo "| Data Integrity + Pipeline Framework                  | $(r ${{ needs.test-data-integrity.result }})                | schema, PII, snapshots |" >> $GITHUB_STEP_SUMMARY
          echo "| Pipeline Tools (linting, coverage, deployment gates) | $(r ${{ needs.test-pipeline-tools.result }})                | eslint, pytest-cov, gates |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.results.outputs.health }}" == "healthy" ]; then
            echo "✅ **All 14 pipeline components are functioning correctly.**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.results.outputs.health }}" == "degraded" ]; then
            echo "⚠️ **${{ steps.results.outputs.failed_count }} component(s) degraded — pipeline functional but needs attention.**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Critical failures in ${{ steps.results.outputs.failed_count }} component(s) — immediate attention required.**" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Auto-generated by Pipeline Self-Validation • next scheduled run: tomorrow 02:00 UTC_" >> $GITHUB_STEP_SUMMARY

      - name: Save report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-health-report-${{ env.TIMESTAMP }}
          path: ${{ github.step_summary }}
          retention-days: 90

      - name: Fail on critical health
        if: steps.results.outputs.health == 'critical' && github.event.inputs.notify_on_failure != 'false'
        run: |
          echo "❌ Critical pipeline failures — ${{ steps.results.outputs.failed_count }}/14 components failed"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # Phase 4: Done
  # ───────────────────────────────────────────────────────────────────────────

  final-validation-summary:
    needs: generate-pipeline-health-report
    if: always()
    runs-on: ubuntu-latest
    name: 🎯 Final Validation Summary
    defaults:
      run:
        working-directory: AgenticQA
    steps:
      - name: Summary
        run: |
          echo "=================================="
          echo "PIPELINE SELF-VALIDATION COMPLETE"
          echo "=================================="
          echo ""
          echo "14 components validated:"
          echo "  Agents:     SRE, SDET, Fullstack, Compliance/QA/Perf/DevOps"
          echo "  Governance: Constitutional Gate, Agent Scopes, Red Team"
          echo "  Learning:   ML Loop (5 phases), Agent Factory"
          echo "  Infra:      DataflowHealthMonitor, SARIF Export, RAG"
          echo "  Pipeline:   Data Integrity, Tools, Integration Workflows"
          echo ""
          echo "Next scheduled run: tomorrow at 02:00 UTC"
          echo "=================================="
