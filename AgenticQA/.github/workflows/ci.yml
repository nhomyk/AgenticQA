              results['legal'] = {'error': str(e)}
          try:
              from agenticqa.security.hipaa_phi_scanner import HIPAAPHIScanner
              r = HIPAAPHIScanner().scan('.')
              results['hipaa'] = {'risk_score': r.risk_score, 'total': len(r.findings), 'critical': len(r.critical_findings)}
          except Exception as e:
              results['hipaa'] = {'error': str(e)}
          try:
              from agenticqa.compliance.ai_act import AIActComplianceChecker
              r = AIActComplianceChecker().check('.')
              results['ai_act'] = {'risk_category': r.risk_category, 'conformity_score': r.conformity_score, 'annex_iii': r.annex_iii_match}
          except Exception as e:
              results['ai_act'] = {'error': str(e)}
          print(json.dumps(results, indent=2))
          " > compliance-static-scan.json 2>/dev/null || echo '{"error": "scan failed"}' > compliance-static-scan.json

          echo "## 🛡️ Static Compliance Scan" >> $GITHUB_STEP_SUMMARY
          python -c "
          import json
          try:
              data = json.load(open('compliance-static-scan.json'))
              legal = data.get('legal', {})
              hipaa = data.get('hipaa', {})
              ai_act = data.get('ai_act', {})
              print('| Scanner | Risk Score | Findings | Critical/Category |')
              print('|---|---|---|---|')
              print(f'| Legal Risk | {legal.get(\"risk_score\", \"err\")} | {legal.get(\"total\", \"err\")} | {legal.get(\"critical\", \"err\")} |')
              print(f'| HIPAA PHI | {hipaa.get(\"risk_score\", \"err\")} | {hipaa.get(\"total\", \"err\")} | {hipaa.get(\"critical\", \"err\")} |')
              print(f'| EU AI Act | {ai_act.get(\"conformity_score\", \"err\")} | {ai_act.get(\"risk_category\", \"err\")} | {ai_act.get(\"annex_iii\", [])} |')
          except Exception as e:
              print(f'Parse error: {e}')
          " >> $GITHUB_STEP_SUMMARY || true

      - name: Upload static compliance scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compliance-static-scan
          path: compliance-static-scan.json
          retention-days: 30

      - name: Check for compliance critical issues
        run: |
          if grep -q "🔴 Critical Issues.*must be resolved" compliance-audit-report.md; then
            echo "⚠️  Compliance audit found critical issues"
            exit 0
          fi
          echo "✅ Compliance audit passed"

      - name: Save learning databases
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.agenticqa/
            .agenticqa/
            .test-artifact-store/
            qdrant_storage/
          key: agenticqa-learning-v1-${{ runner.os }}-${{ github.run_id }}

  # Phase 2: Compliance Summary
  compliance-summary:
    needs: [sdet-agent, compliance-agent]
    runs-on: ubuntu-latest
    name: Compliance Summary
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Generate Summary
        run: |
          echo "## 📊 Compliance Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f pa11y-report/pa11y-report.json ]; then
            echo "✅ **Accessibility Report Generated**" >> $GITHUB_STEP_SUMMARY

            # Show accessibility details if available
            if [ -f pa11y-report/pa11y-report.txt ]; then
              ERROR_COUNT=$(grep -c "^\s*•" pa11y-report/pa11y-report.txt 2>/dev/null) || ERROR_COUNT=0
              echo "   - Violations found: $ERROR_COUNT" >> $GITHUB_STEP_SUMMARY
            fi

            # Check for revalidation results
            if [ -f pa11y-report/pa11y-revalidate.json ]; then
              echo "   - ✅ Auto-fixes applied and re-validated" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          if [ -f audit-report/audit-report.json ]; then
            echo "✅ **Security Report Generated**" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🧠 Learning Loop Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The following artifacts were ingested to Weaviate for agent learning:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f pa11y-report/pa11y-report.json ]; then
            echo "- 🦾 **ComplianceAgent**: Pa11y accessibility report ingested" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f audit-report/audit-report.json ]; then
            echo "- 🔒 **DevOps Agent**: Security audit results ingested" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "💡 **Continuous Improvement**: Agents learn from every CI run to provide better fixes over time." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Reports available in artifacts for review" >> $GITHUB_STEP_SUMMARY

  # Phase 2: Fullstack Agent (Only runs after BOTH Phase 1 agents complete)
  fullstack-agent:
    needs: [compliance-summary]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: "Phase 2️⃣ Fullstack Agent (Code & Compliance Fixes)"
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: "⏳ Waiting for Phase 1 testing to complete"
        run: echo "🔄 All Phase 1 jobs complete - proceeding with fixes"
      - name: Download test failure artifacts
        uses: actions/download-artifact@v4
        with:
          name: test-failures
          path: ./test-failures
        continue-on-error: true
      - name: Download compliance audit report
        uses: actions/download-artifact@v4
        with:
          name: compliance-audit-report
          path: ./compliance-artifacts
        continue-on-error: true
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        continue-on-error: true
      - name: Set up git credentials
        run: |
          git config --global user.name "fullstack-agent[bot]"
          git config --global user.email "fullstack-agent[bot]@users.noreply.github.com"
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: "🔧 Run Fullstack Agent - Fix Phase"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          COMPLIANCE_MODE: "enabled"
          PHASE: "fixes"
        run: node fullstack-agent.js

  # Phase 3: SRE Agent (Only runs after Fullstack Agent completes)
  sre-agent:
    needs: [fullstack-agent]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: "Phase 3️⃣ SRE Agent (Pipeline & Production Fixes)"
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Restore learning databases
        uses: actions/cache@v4
        with:
          path: |
            ~/.agenticqa/
            .agenticqa/
            .test-artifact-store/
            qdrant_storage/
          key: agenticqa-learning-v1-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            agenticqa-learning-v1-${{ runner.os }}-

      - name: Start Qdrant vector store
        run: |
          mkdir -p qdrant_storage
          docker run -d --name agenticqa-qdrant \
            -p 6333:6333 \
            -v "$(pwd)/qdrant_storage:/qdrant/storage" \
            qdrant/qdrant:v1.9.0
          for i in $(seq 1 12); do
            curl -sf http://localhost:6333/healthz && echo "Qdrant ready" && break
            echo "Waiting for Qdrant... ($i/12)"; sleep 3
          done
        continue-on-error: true

      - name: Dataflow health preflight check
        run: python -m agenticqa.monitoring.dataflow_health --json 2>/dev/null || true
        continue-on-error: true
        env:
          QDRANT_URL: http://localhost:6333

      - name: "⏳ Waiting for Phase 2 fixes to complete"
        run: echo "🔄 Fullstack agent has completed code fixes"
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        continue-on-error: true
      - name: Set up git credentials
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - name: "🚀 Run SRE Agent - Production Fixes Phase"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PHASE: "production-fixes"
          VECTOR_PROVIDER: qdrant
          QDRANT_URL: http://localhost:6333
          AGENTICQA_VECTOR_DUAL_WRITE: "true"
          WEAVIATE_HOST: ${{ secrets.WEAVIATE_HOST }}
          WEAVIATE_API_KEY: ${{ secrets.WEAVIATE_API_KEY }}
        run: node agentic_sre_engineer.js
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install AgenticQA
        run: pip install -e . -q
        continue-on-error: true

      - name: "🔍 TypeScript SRE Analysis (oxlint/eslint)"
        env:
          VECTOR_PROVIDER: qdrant
          QDRANT_URL: http://localhost:6333
          AGENTICQA_VECTOR_DUAL_WRITE: "true"
          WEAVIATE_HOST: ${{ secrets.WEAVIATE_HOST }}
          WEAVIATE_API_KEY: ${{ secrets.WEAVIATE_API_KEY }}
        run: |
          python - <<'PYEOF'
          import sys, json, subprocess, os
          sys.path.insert(0, 'src')
          from agents import SREAgent
          agent = SREAgent()
          result = agent.execute({
              'repo_path': '.',
              'language': 'typescript',
              'run_id': '${{ github.run_id }}',
          })
          print(json.dumps(result, indent=2, default=str))
          with open('sre-ts-output.json', 'w') as f:
              json.dump(result, f, indent=2, default=str)
          print(f"TypeScript SRE: {result.get('total_errors',0)} errors, "
                f"{result.get('fixes_applied',0)} fixes, "
                f"fix_rate={result.get('fix_rate',0):.1%}")
          PYEOF
        continue-on-error: true

      - name: Upload TypeScript SRE results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sre-ts-output
          path: sre-ts-output.json
          retention-days: 7

      - name: Shell script linting (shellcheck)
        run: |
          python - <<'PYEOF'
          import sys, json
          sys.path.insert(0, 'src')
          from agents import SREAgent
          from unittest.mock import MagicMock
          agent = SREAgent.__new__(SREAgent)
          agent._strategy_selector = None
          agent.log = MagicMock()
          errors = agent._run_shell_linter('.')
          with open('sre-shell-output.json', 'w') as f:
              json.dump({"shell_errors": errors, "shell_error_count": len(errors)}, f, indent=2)
          print(f"shellcheck: {len(errors)} issue(s) found")
          for e in errors[:10]:
              print(f"  {e['file']}:{e['line']} [{e['rule']}] {e['message'][:80]}")
          PYEOF
        continue-on-error: true

      - name: Export findings as SARIF
        if: always()
        run: |
          # Merge SRE Python + TS + shell findings into one SARIF file
          python - <<'PYEOF'
          import sys, json
          from pathlib import Path
          sys.path.insert(0, 'src')
          from agenticqa.export.sarif import SARIFExporter
          exporter = SARIFExporter(repo_root='.')
          for fname in ('sre-output.json', 'sre-ts-output.json'):
              if Path(fname).exists():
                  try:
                      exporter.add_sre_result(json.loads(Path(fname).read_text()))
                  except Exception as e:
                      print(f'Warning: {fname}: {e}')
          if Path('sre-shell-output.json').exists():
              try:
                  shell_data = json.loads(Path('sre-shell-output.json').read_text())
                  exporter.add_sre_result(shell_data)
              except Exception as e:
                  print(f'Warning: shell SARIF: {e}')
          n = exporter.write('agenticqa-results.sarif')
          print(f'SARIF: {n} finding(s) written to agenticqa-results.sarif')
          PYEOF
        continue-on-error: true

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: agenticqa-results.sarif
          category: agenticqa-sre
        continue-on-error: true

      - name: Save learning databases
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            ~/.agenticqa/
            .agenticqa/
            .test-artifact-store/
            qdrant_storage/
          key: agenticqa-learning-v1-${{ runner.os }}-${{ github.run_id }}

  # Red Team Agent — adversarial scan, auto-patch scanner, propose constitutional amendments
  red-team-scan:
    needs: [sre-agent]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: "🔴 Red Team Security Scan"
    steps:
      - uses: actions/checkout@v4

      - name: Restore red team patterns
        uses: actions/cache@v4
        with:
          path: |
            ~/.agenticqa/
            .agenticqa/
            .test-artifact-store/
            qdrant_storage/
          key: agenticqa-learning-v1-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            agenticqa-learning-v1-${{ runner.os }}-

      - name: Start Qdrant vector store
        run: |
          mkdir -p qdrant_storage
          docker run -d --name agenticqa-qdrant \
            -p 6333:6333 \
            -v "$(pwd)/qdrant_storage:/qdrant/storage" \
            qdrant/qdrant:v1.9.0
          for i in $(seq 1 12); do
            curl -sf http://localhost:6333/healthz && echo "Qdrant ready" && break
            echo "Waiting for Qdrant... ($i/12)"; sleep 3
          done
        continue-on-error: true

      - name: Dataflow health preflight check
        run: python -m agenticqa.monitoring.dataflow_health --json 2>/dev/null || true
        continue-on-error: true
        env:
          QDRANT_URL: http://localhost:6333

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "AgenticQA[dev,quality]"

      - name: Run Red Team scan
        id: redteam
        env:
          VECTOR_PROVIDER: qdrant
          QDRANT_URL: http://localhost:6333
          AGENTICQA_VECTOR_DUAL_WRITE: "true"
          WEAVIATE_HOST: ${{ secrets.WEAVIATE_HOST }}
          WEAVIATE_API_KEY: ${{ secrets.WEAVIATE_API_KEY }}
          AGENTICQA_RAG_MODE: ${{ secrets.AGENTICQA_RAG_MODE || 'local' }}
          AGENTICQA_HYBRID_RAG: "true"
        run: |
          mkdir -p .agenticqa
          # Write JSON result to file, log lines to stderr so tee captures clean JSON
          python -c "
          import sys, json
          sys.path.insert(0, 'src')
          from agents import RedTeamAgent
          agent = RedTeamAgent()
          result = agent.execute({'mode': 'fast', 'target': 'both', 'auto_patch': True})
          # Clean JSON to stdout only
          sys.stdout.write(json.dumps(result, indent=2))
          # Metrics to stderr (visible in logs, not in file)
          print(f'scanner_strength={result[\"scanner_strength\"]:.1%}  gate_strength={result[\"gate_strength\"]:.1%}  bypasses={result[\"successful_bypasses\"]}  patches={result[\"patches_applied\"]}', file=sys.stderr)
          " > redteam-output.json 2>&1
          # Write step summary from clean JSON
          echo "## 🔴 Red Team Scan Results" >> $GITHUB_STEP_SUMMARY
          python -c "
          import json, sys
          try:
              data = json.load(open('redteam-output.json'))
          except Exception as e:
              print(f'Parse error: {e}', file=sys.stderr)
              sys.exit(0)
          rows = [
              ('Scanner Strength', f'{data[\"scanner_strength\"]:.1%}'),
              ('Gate Strength',    f'{data[\"gate_strength\"]:.1%}'),
              ('Bypass Attempts',  data['bypass_attempts']),
              ('Successful Bypasses', data['successful_bypasses']),
              ('Patches Applied',  data['patches_applied']),
              ('Proposals Generated', data['proposals_generated']),
              ('Status',           data['status']),
              ('Prompt Injection Surface', f'{data.get(\"prompt_injection_surface\", 0):.0%}'),
              ('Injection Findings', data.get('prompt_injection_findings', 0)),
          ]
          print('| Metric | Value |')
          print('|---|---|')
          for label, val in rows:
              print(f'| {label} | {val} |')
          " >> $GITHUB_STEP_SUMMARY || true
        continue-on-error: true

      - name: Ingest red team results to learning system
        if: always()
        env:
          WEAVIATE_HOST: ${{ secrets.WEAVIATE_HOST }}
          WEAVIATE_API_KEY: ${{ secrets.WEAVIATE_API_KEY }}
          AGENTICQA_RAG_MODE: ${{ secrets.AGENTICQA_RAG_MODE || 'local' }}
          AGENTICQA_HYBRID_RAG: "true"
        run: |
          if [ -f redteam-output.json ]; then
            python ingest_ci_artifacts.py \
              --agent-log redteam-output.json \
              --agent-type red-team \
              --run-id ${{ github.run_id }} || echo "⚠️ Red team ingestion skipped"
            echo "✅ Red team results ingested — scanner/gate strength trends now tracked"
          fi
        continue-on-error: true

      - name: Save red team patterns (persist learned bypasses)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.agenticqa/
            .agenticqa/
            .test-artifact-store/
            qdrant_storage/
          key: agenticqa-learning-v1-${{ runner.os }}-${{ github.run_id }}

  # MCP + Cross-Agent DataFlow Security Scan — runs on every push
  # Scans src/ for: tool poisoning, SSRF, supply chain risks, credential exfiltration
  # Fails CI on critical findings; ingests results into learning time-series
  mcp-dataflow-security-scan:
    needs: [red-team-scan]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 8
    name: "🔍 MCP + DataFlow Security Scan"
    steps:
      - uses: actions/checkout@v4

      - name: Restore learned patterns cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.agenticqa/
            .agenticqa/
            .test-artifact-store/
          key: agenticqa-learning-v1-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            agenticqa-learning-v1-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev,quality]"

      - name: Run MCP Security Scan
        id: mcp_scan
        run: |
          mkdir -p .agenticqa
          python -c "
          import sys, json
          sys.path.insert(0, 'src')
          from agenticqa.security.mcp_scanner import MCPSecurityScanner
          scanner = MCPSecurityScanner()
          result = scanner.scan('src')
          out = {
              'files_scanned': result.files_scanned,
              'tools_scanned': result.tools_scanned,
              'servers_scanned': result.servers_scanned,
              'findings': len(result.findings),
              'risk_score': result.risk_score,
              'critical_count': sum(1 for f in result.findings if f.severity == 'critical'),
              'attack_types': list({f.attack_type for f in result.findings}),
              'finding_details': [
                  {'type': f.attack_type, 'severity': f.severity,
                   'file': f.source_file.split('/')[-1], 'line': f.line_number,
                   'desc': f.description[:120]}
                  for f in result.findings
              ],
          }
          json.dump(out, open('mcp-scan-output.json', 'w'), indent=2)
          print(json.dumps(out, indent=2))
          if out['critical_count'] > 0:
              print(f'CRITICAL: {out[\"critical_count\"]} critical MCP findings', file=sys.stderr)
              sys.exit(1)
          "
          echo "MCP scan risk_score=$(python -c "import json; print(json.load(open('mcp-scan-output.json'))['risk_score'])")" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run Cross-Agent DataFlow Trace
        id: flow_scan
        run: |
          python -c "
          import sys, json
          sys.path.insert(0, 'src')
          from agenticqa.security.data_flow_tracer import CrossAgentDataFlowTracer
          tracer = CrossAgentDataFlowTracer()
          report = tracer.trace('src')
          out = {
              'files_scanned': report.files_scanned,
              'agents_analyzed': report.agents_analyzed,
              'tainted_variables': report.tainted_variables_detected,
              'findings': len(report.findings),
              'risk_score': report.risk_score,
              'critical_count': len(report.critical_findings),
              'finding_types': report.finding_types,
              'finding_details': [
                  {'type': f.finding_type, 'severity': f.severity,
                   'file': f.source_file.split('/')[-1], 'line': f.line_number,
                   'desc': f.description[:120]}
                  for f in report.findings if f.severity in ('critical', 'high')
              ],
          }
          json.dump(out, open('dataflow-scan-output.json', 'w'), indent=2)
          print(json.dumps(out, indent=2))
          if out['critical_count'] > 0:
              print(f'CRITICAL: {out[\"critical_count\"]} critical DataFlow findings', file=sys.stderr)
              sys.exit(1)
          "
          echo "DataFlow scan risk_score=$(python -c "import json; print(json.load(open('dataflow-scan-output.json'))['risk_score'])")" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run Agent Skill Security Scan
        id: skill_scan
        run: |
          python -c "
          import sys, json
          sys.path.insert(0, 'src')
          from agenticqa.security.agent_skill_scanner import AgentSkillScanner
          scanner = AgentSkillScanner()
          results = scanner.scan_directory('.agenticqa/custom_agents')
          out = {
              'total_files': len(results),
              'safe': sum(1 for r in results if r.is_safe),
              'blocked': sum(1 for r in results if not r.is_safe),
              'max_risk_score': max((r.risk_score for r in results), default=0.0),
              'critical_count': sum(
                  1 for r in results for f in r.findings if f.severity == 'critical'
              ),
              'attack_types': list({f.attack_type for r in results for f in r.findings}),
              'results': [r.to_dict() for r in results],
          }
          json.dump(out, open('skill-scan-output.json', 'w'), indent=2)
          print(json.dumps({k: v for k, v in out.items() if k != 'results'}, indent=2))
          if out['blocked'] > 0:
              print(f'BLOCKED: {out[\"blocked\"]} agent skill file(s) failed security scan', file=sys.stderr)
              sys.exit(1)
          "
          echo "skill_scan_blocked=$(python -c "import json; print(json.load(open('skill-scan-output.json'))['blocked'])")" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Write scan summary
        if: always()
        run: |
          echo "## 🔍 MCP + DataFlow + Skill Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python -c "
          import json, sys
          mcp = json.load(open('mcp-scan-output.json')) if __import__('os').path.exists('mcp-scan-output.json') else {}
          flow = json.load(open('dataflow-scan-output.json')) if __import__('os').path.exists('dataflow-scan-output.json') else {}
          skill = json.load(open('skill-scan-output.json')) if __import__('os').path.exists('skill-scan-output.json') else {}
          print('| Scanner | Files | Findings | Risk Score | Critical |')
          print('|---|---|---|---|---|')
          print(f'| MCP Security | {mcp.get(\"files_scanned\",0)} | {mcp.get(\"findings\",0)} | {mcp.get(\"risk_score\",0):.3f} | {mcp.get(\"critical_count\",0)} |')
          print(f'| DataFlow Trace | {flow.get(\"files_scanned\",0)} | {flow.get(\"findings\",0)} | {flow.get(\"risk_score\",0):.3f} | {flow.get(\"critical_count\",0)} |')
          print(f'| Agent Skill Scan | {skill.get(\"total_files\",0)} | {skill.get(\"blocked\",0)} blocked | {skill.get(\"max_risk_score\",0):.3f} | {skill.get(\"critical_count\",0)} |')
          if mcp.get('attack_types'):
              print(f'')
              print(f'**MCP Attack Types:** {chr(96)}{chr(44).join(mcp[\"attack_types\"])}{chr(96)}')
          if flow.get('finding_types'):
              print(f'**DataFlow Finding Types:** {chr(96)}{chr(44).join(flow[\"finding_types\"])}{chr(96)}')
          if skill.get('attack_types'):
              print(f'**Skill Attack Types:** {chr(96)}{chr(44).join(skill[\"attack_types\"])}{chr(96)}')
          for d in (mcp.get('finding_details', []) + flow.get('finding_details', [])):
              sev_icon = {'critical':'🔴','high':'🟠','medium':'🟡','low':'🔵'}.get(d.get('severity',''), '⚪')
              print(f'')
              print(f'{sev_icon} **{d[\"type\"]}** — {d[\"file\"]}:{d[\"line\"]}')
              print(f'> {d[\"desc\"]}')
          " >> $GITHUB_STEP_SUMMARY || true

      - name: Ingest scan results to learning system
        if: always()
        env:
          WEAVIATE_HOST: ${{ secrets.WEAVIATE_HOST }}
          WEAVIATE_API_KEY: ${{ secrets.WEAVIATE_API_KEY }}
          AGENTICQA_RAG_MODE: ${{ secrets.AGENTICQA_RAG_MODE || 'local' }}
        run: |
          if [ -f mcp-scan-output.json ]; then
            python ingest_ci_artifacts.py \
              --mcp-scan mcp-scan-output.json \
              --run-id ${{ github.run_id }} || echo "⚠️  MCP ingest skipped"
          fi
          if [ -f dataflow-scan-output.json ]; then
            python ingest_ci_artifacts.py \
              --data-flow-trace dataflow-scan-output.json \
              --run-id ${{ github.run_id }} || echo "⚠️  DataFlow ingest skipped"
          fi
          if [ -f skill-scan-output.json ]; then
            python ingest_ci_artifacts.py \
              --skill-scan skill-scan-output.json \
              --run-id ${{ github.run_id }} || echo "⚠️  Skill scan ingest skipped"
          fi
        continue-on-error: true

      - name: Save learned patterns
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.agenticqa/
            .agenticqa/
            .test-artifact-store/
          key: agenticqa-learning-v1-${{ runner.os }}-${{ github.run_id }}

  # FINAL GATE: Pipeline health verification
  # This ensures the pipeline doesn't get stuck in a failed state
  pipeline-health-check:
    needs: [red-team-scan, custom-agents, mcp-dataflow-security-scan]
    runs-on: ubuntu-latest
    name: 🏥 Pipeline Health Verification
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for infinite loop conditions
        run: |
          # Check if this is a repair commit
          LAST_COMMIT=$(git log -1 --format=%s)
          
          if [[ "$LAST_COMMIT" == *"workflow repair"* ]] || [[ "$LAST_COMMIT" == *"auto-fix"* ]]; then
            echo "ℹ️  This is a repair commit"
            
            # Check if we're in a repair loop (too many consecutive repairs)
            REPAIR_COUNT=$(git log --oneline | grep -c "workflow repair\|auto-fix" | head -5)
            
            if [ "$REPAIR_COUNT" -gt 3 ]; then
              echo "🚨 ALERT: Too many consecutive repairs detected"
              echo "This may indicate an infinite loop."
              echo ""
              echo "⚠️  Manual intervention may be required"
              exit 1
            fi
          fi
      
      - name: Report health status
        run: |
          echo "## 🏥 Pipeline Health Report" >> $GITHUB_STEP_SUMMARY
          echo "✅ No infinite loop conditions detected" >> $GITHUB_STEP_SUMMARY
          echo "✅ Pipeline is healthy" >> $GITHUB_STEP_SUMMARY
  # Pipeline Failure Ingestion for SRE Agent Learning
  pipeline-failure-ingestion:
    needs: [
      linting-fix,
      lint,
      phase-1-testing,
      phase-1-compliance-scans,
      sdet-agent,
      compliance-agent,
      sre-agent,
      red-team-scan,
      custom-agents,
      pipeline-health-check
    ]
    runs-on: ubuntu-latest
    name: 🧠 Pipeline Failure Learning (SRE Agent)
    if: failure()  # Only run if pipeline failed
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install AgenticQA package
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir weaviate-client>=4.0.0 numpy>=1.26.0
          pip install --no-cache-dir -e .
      
      - name: Collect Pipeline Failure Details
        id: collect-failures
        run: |
          echo "🔍 Collecting pipeline failure details..."
          
          cat > pipeline-failure.json << 'REPORT'
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "run_id": "${{ github.run_id }}",
            "run_number": "${{ github.run_number }}",
            "workflow": "${{ github.workflow }}",
            "commit_sha": "${{ github.sha }}",
            "commit_message": "$(git log -1 --format=%s)",
            "branch": "${{ github.ref_name }}",
            "triggered_by": "${{ github.actor }}",
            "job_statuses": {
              "linting-fix": "${{ needs.linting-fix.result }}",
              "lint": "${{ needs.lint.result }}",
              "phase-1-testing": "${{ needs.phase-1-testing.result }}",
              "phase-1-compliance-scans": "${{ needs.phase-1-compliance-scans.result }}",
              "sdet-agent": "${{ needs.sdet-agent.result }}",
              "compliance-agent": "${{ needs.compliance-agent.result }}",
              "sre-agent": "${{ needs.sre-agent.result }}",
              "pipeline-health-check": "${{ needs.pipeline-health-check.result }}"
            },
            "failure_type": "pipeline_failure",
            "severity": "high"
          }
          REPORT
          
          echo "✅ Pipeline failure details collected"
          cat pipeline-failure.json
      
      - name: Ingest Pipeline Failure to Weaviate
        env:
          WEAVIATE_HOST: ${{ secrets.WEAVIATE_HOST }}
          WEAVIATE_API_KEY: ${{ secrets.WEAVIATE_API_KEY }}
          AGENTICQA_RAG_MODE: ${{ secrets.AGENTICQA_RAG_MODE || 'local' }}
          AGENTICQA_HYBRID_RAG: true
        run: |
          echo "🧠 Ingesting pipeline failure to Weaviate for SRE agent learning..."
          echo "🔀 Hybrid RAG Mode: ENABLED (Vector + Relational Storage)"
          
          python ingest_ci_artifacts.py \
            --pipeline-health pipeline-failure.json \
            --run-id ${{ github.run_id }} || echo "⚠️  Pipeline failure ingestion skipped"
          
          echo "✅ Pipeline failure ingested - SRE agent will learn from this!"
          echo "💡 The SRE agent can now:"
          echo "   - Identify patterns in pipeline failures"
          echo "   - Auto-fix common issues"
          echo "   - Prevent similar failures in future runs"
        continue-on-error: true

  # ── Custom Agent Runner ────────────────────────────────────────────────────
  # Discovers and executes agents created via the Agent Factory.
  # Runs early (needs only pipeline-framework) so custom agents participate
  # in the same run as built-in agents. Never blocks the pipeline.
  custom-agents:
    needs: [pipeline-framework]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: 🤖 Custom Agent Runner
    steps:
      - uses: actions/checkout@v4

      - name: Restore learning databases
        uses: actions/cache@v4
        with:
          path: |
            ~/.agenticqa/
            .agenticqa/
            .test-artifact-store/
            qdrant_storage/
          key: agenticqa-learning-v1-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            agenticqa-learning-v1-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install AgenticQA
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -e .

      - name: List discovered custom agents
        run: |
          python run_custom_agents.py --list || echo "No custom agents found"

      - name: Run custom agents
        run: |
          if [ -d .agenticqa/custom_agents ] && \
             ls .agenticqa/custom_agents/*.py 2>/dev/null | head -1 > /dev/null; then
            python run_custom_agents.py \
              --run-id ${{ github.run_id }} \
              --agents-dir .agenticqa/custom_agents \
            || echo "Custom agent run completed with errors"
          else
            echo "No custom agents to run"
          fi
        continue-on-error: true

      - name: Upload custom agent results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: custom-agents-output
          path: custom-agents-output.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Ingest custom agent results
        if: always()
        env:
          WEAVIATE_HOST: ${{ secrets.WEAVIATE_HOST }}
          WEAVIATE_API_KEY: ${{ secrets.WEAVIATE_API_KEY }}
        run: |
          if [ -f custom-agents-output.json ]; then
            python ingest_ci_artifacts.py \
              --agent-log custom-agents-output.json \
              --agent-type custom \
              --run-id ${{ github.run_id }} || echo "Ingestion skipped"
          fi
        continue-on-error: true

      - name: Save learning databases
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.agenticqa/
            .agenticqa/
            .test-artifact-store/
            qdrant_storage/
          key: agenticqa-learning-v1-${{ runner.os }}-${{ github.run_id }}

  # ── PR Risk Pre-flight ──────────────────────────────────────────────────────
  # Scores PR risk BEFORE CI agents run — gives reviewers immediate signal.
  pr-risk-preflight:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: 🚦 PR Risk Pre-flight
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for git diff

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install AgenticQA
        run: pip install --no-cache-dir -e .

      - name: Score PR risk and post comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python post_pr_risk_comment.py \
            --base-ref "origin/${{ github.base_ref }}" \
            --author-email "${{ github.event.pull_request.user.login }}@users.noreply.github.com" \
            --repo-path . \
            --pr-number "${{ github.event.pull_request.number }}" \
            --github-repo "${{ github.repository }}"
        continue-on-error: true   # never block CI — risk score is informational

  # ── PR Comment ─────────────────────────────────────────────────────────────
  # Aggregates all agent results into one structured PR comment.
  # Only runs on pull_request events — not on direct pushes.
  post-pr-comment:
    needs: [pipeline-health-check, red-team-scan, sdet-agent, compliance-agent, sre-agent]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: 💬 Post PR Comment
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download agent output artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-output"
          merge-multiple: true
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install AgenticQA
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -e .

      - name: Run semantic diff and post inline risk comments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/ci_semantic_diff.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.sha }}" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
          || echo "Semantic diff step skipped"
        continue-on-error: true

      - name: Post CI results to PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python post_pr_comment.py \
            --run-id "${{ github.run_id }}" \
            --commit-sha "${{ github.sha }}" \
            --redteam-json redteam-output.json \
            --sdet-json sdet-output.json \
            --compliance-json compliance-output.json \
            --sre-json sre-output.json \
            --qa-json qa-output.json \
          || echo "PR comment step skipped (non-PR context or no token)"
        continue-on-error: true
